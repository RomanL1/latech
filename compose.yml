services:
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: rabbitmq-server
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=your_secure_password_here
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always

  socket-server:
    build: ./src/socket-server
    container_name: socket-server
    ports:
      - 3000:3000
    environment:
      - HOST=0.0.0.0
      - PORT=3000
    restart: always

  postgres:
    image: 'postgres:latest'
    container_name: postgres
    environment:
      - 'POSTGRES_DB=latech'
      - 'POSTGRES_USER=myuser'
      - 'POSTGRES_PASSWORD=secret'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

  api:
    build:
      context: ./src/api
      dockerfile: Dockerfile
    container_name: api
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/latech
      - SPRING_DATASOURCE_USERNAME=myuser
      - SPRING_DATASOURCE_PASSWORD=secret
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=your_secure_password_here
      - SPRING_GRPC_CLIENT_DEFAULT_CHANNEL_ADDRESS=static://renderer:9090
    depends_on:
      - postgres
      - rabbitmq
      - renderer
    restart: always

  renderer:
    build:
      context: ./src/renderer
      dockerfile: Dockerfile
    container_name: renderer
    ports:
      - "8090:8090"
      - "9090:9090"
    environment:
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=your_secure_password_here
    depends_on:
      - rabbitmq
    restart: always

  frontend:
    build:
      context: .
      dockerfile: src/frontend/Dockerfile
      args:
        WEBSOCKET_SERVER_URL: ws://localhost:3000/ws
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - api
      - socket-server
    restart: always

volumes:
  rabbitmq_data:
  postgres_data: