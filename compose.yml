services:
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: rabbitmq-server
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=your_secure_password_here
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always

  socket-server:
    # TODO: add healtcheck to ensure api is up before starting socket-server
    # depends_on:
    #   api:
    #     condition: service_healthy
    build: 
      context: ./src/socket-server
    environment:
      - CALLBACK_URL=http://api:8080/api/document/callback
      - CALLBACK_OBJECT_NAME=latech
    container_name: socket-server
    ports:
      - 3000:3000
    restart: always
  
  api:
    build: ./src/api
    container_name: api
    ports:
      - "5001:5001"
    environment:
      - 'PORT=5001'
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/latech'
      - 'SPRING_RABBITMQ_HOST=rabbitmq'
      - 'SPRING_GRPC_CLIENT_DEFAULT_CHANNEL_ADDRESS=static://renderer:9090'
    depends_on:
      - postgres
      - rabbitmq
    restart: always


  postgres:
    image: 'postgres:latest'
    container_name: postgres
    environment:
      - 'POSTGRES_DB=latech'
      - 'POSTGRES_USER=myuser'
      - 'POSTGRES_PASSWORD=secret'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

volumes:
  rabbitmq_data:
  postgres_data: