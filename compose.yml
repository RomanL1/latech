services:
  rabbitmq:
    image: rabbitmq:4.0-management
    container_name: rabbitmq-server
    ports:
      - "5672:5672"   # AMQP protocol port
      - "15672:15672" # Management UI port
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=your_secure_password_here
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: always

  socket-server:
    build: ./src/socket-server
    container_name: socket-server
    ports:
      - 3000:3000
    environment:
      - HOST=0.0.0.0
      - PORT=3000
    restart: always

  api:
    build: ./src/api
    container_name: api
    ports:
      - "5001:5001"
    environment:
      - 'PORT=5001'
      - 'RABBITMQ_HOST=rabbitmq'
      - 'RABBITMQ_PASSWORD=your_secure_password_here'
      - 'RABBITMQ_PORT=5672'
      - 'RABBITMQ_USERNAME=admin'
      - 'RENDERER_URL=http://renderer:8090'
      - 'SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/latech'
    depends_on:
      - postgres
      - rabbitmq
    restart: always

  renderer:
    build: ./src/renderer
    container_name: renderer
    ports:
      - "8090:8090"
    environment:
      - PORT=8090
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USERNAME=admin
      - RABBITMQ_PASSWORD=your_secure_password_here
    depends_on:
      - rabbitmq
    restart: always

  postgres:
    image: 'postgres:latest'
    container_name: postgres
    environment:
      - 'POSTGRES_DB=latech'
      - 'POSTGRES_USER=myuser'
      - 'POSTGRES_PASSWORD=secret'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    restart: unless-stopped

volumes:
  rabbitmq_data:
  postgres_data: