info:
  name: createDocument
  type: http
  seq: 1
  tags:
    - document-controller

http:
  method: POST
  url: "{{baseUrl}}/api/document"
  body:
    type: json
    data: |-
      {
        "name": "FirstDocument",
        "templateId": "4873d267-d356-47af-8c97-51983c3691c6"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: bru.setEnvVar('docId', res('documentId'))

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/document"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "password": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "uuid": "",
            "name": ""
          }
