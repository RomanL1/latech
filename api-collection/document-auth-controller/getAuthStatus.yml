info:
  name: getAuthStatus
  type: http
  seq: 1
  tags:
    - document-auth-controller

http:
  method: GET
  url: "{{baseUrl}}/api/document/:docId/auth-status"
  params:
    - name: docId
      value: "{{docId}}"
      type: path
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/document/:docId/auth-status"
      method: GET
      params:
        - name: docId
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: |-
          {
            "authenticated": true
          }
