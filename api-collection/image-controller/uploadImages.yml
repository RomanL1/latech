info:
  name: uploadImages
  type: http
  seq: 1
  tags:
    - image-controller

http:
  method: POST
  url: "{{baseUrl}}/api/document/{{docId}}/images/upload"
  body:
    type: multipart-form
    data:
      - name: files
        type: file
        value:
          - /Users/gregorlazzarato/Downloads/Unbenanntes Diagramm.drawio (1).png
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        const imageId = body[0]?.id;
        bru.setVar("imageId", imageId);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OK
    request:
      url: "{{baseUrl}}/api/document/:docId/image/upload"
      method: POST
      params:
        - name: docId
          value: ""
          type: path
        - name: name
          value: ""
          type: query
      body:
        type: multipart-form
        data:
          - name: file
            type: file
            value: []
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: "*/*"
      body:
        type: text
        data: ""
