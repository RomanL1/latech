# General
spring.application.name=latech-api
server.port=${SERVER_PORT:5001}
# CORS configuration
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}
# Renderer Service
latech.renderer.url=${RENDERER_URL:http://localhost:8090}
# SeaweedFS
seaweedfs.host=${SEAWEEDFS_HOST:localhost}
seaweedfs.port=${SEAWEEDFS_PORT:8333}
seaweedfs.access-key=${SEAWEEDFS_ACCESS_KEY:changeme}
seaweedfs.secret-key=${SEAWEEDFS_SECRET_KEY:changeme}
seaweedfs.bucket=${SEAWEEDFS_BUCKET:renderer}
# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:your_secure_password_here}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-retries=3
spring.rabbitmq.listener.simple.retry.max-interval=10000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
# API Documentation (JSON/YAML)
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.api-docs.version=openapi_3_1
# Swagger UI Configuration
# Default path is /swagger-ui.html (redirects to /swagger-ui/index.html)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
# Optional: Sort endpoints alphabetically
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
# Optional: Tries to execute the request from the browser
springdoc.swagger-ui.try-it-out-enabled=true
# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/latech}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:myuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver
# Specify explicitly the dialect (here for PostgreSQL, adapt for your database)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Disable Hibernate usage of JDBC metadata
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Database initialization should typically be performed outside of Spring lifecycle
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=validate
logging.level.org.springframework.boot.autoconfigure=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
# Enable multipart uploads
spring.servlet.multipart.enabled=true
# Max file size (e.g., 10MB)
spring.servlet.multipart.max-file-size=10MB
# Max request size (total including multiple files and form data)
spring.servlet.multipart.max-request-size=15MB
# Serverless scale-to-zero optimizations
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=840000
# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.out-of-order=false
spring.flyway.placeholder-replacement=false
# Request Logging Configuration
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG


# Document Session Auth
latech.document-session.cookie-name=${DOCUMENT_SESSION_COOKIE_NAME:doc_session}
latech.document-session.ttl-seconds=${DOCUMENT_SESSION_TTL_SECONDS:86400}
latech.document-session.cookie-secure=${DOCUMENT_SESSION_COOKIE_SECURE:false}
latech.document-session.cookie-same-site=${DOCUMENT_SESSION_COOKIE_SAME_SITE:Lax}
latech.document-session.cookie-domain=${DOCUMENT_SESSION_COOKIE_DOMAIN:}
latech.document-session.cleanup-ms=${DOCUMENT_SESSION_CLEANUP_MS:3600000}

# Internal Auth between API and WSS server
latech.internal.auth-secret=${LATECH_INTERNAL_AUTH_SECRET:d1994d751e106da55475cc5aadfb3e742b2c849bdb961b420a934e094108965f}
