spring.application.name=latech-api
server.port=8080
spring.grpc.client.default-channel.address=static://localhost:9090
spring.grpc.client.default-channel.negotiation-type=plaintext

# API Documentation (JSON/YAML)
springdoc.api-docs.path=/api-docs
springdoc.api-docs.enabled=true
springdoc.api-docs.version=openapi_3_1
# Swagger UI Configuration
# Default path is /swagger-ui.html (redirects to /swagger-ui/index.html)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
# Optional: Sort endpoints alphabetically
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
# Optional: Tries to execute the request from the browser
springdoc.swagger-ui.try-it-out-enabled=true

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/latech}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:myuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver
# Specify explicitly the dialect (here for PostgreSQL, adapt for your database)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Disable Hibernate usage of JDBC metadata
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Database initialization should typically be performed outside of Spring lifecycle
spring.sql.init.mode=never
spring.jpa.hibernate.ddl-auto=validate
logging.level.org.springframework.boot.autoconfigure=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

# Enable multipart uploads
spring.servlet.multipart.enabled=true
# Max file size (e.g., 10MB)
spring.servlet.multipart.max-file-size=10MB
# Max request size (total including multiple files and form data)
spring.servlet.multipart.max-request-size=15MB

# Serverless scale-to-zero optimizations
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
spring.datasource.hikari.minimum-idle=0
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=840000