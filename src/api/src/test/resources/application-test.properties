# Test Database Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
# Flyway Settings for H2
spring.flyway.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.flyway.user=sa
spring.flyway.password=
spring.flyway.locations=classpath:db/migration
# You might also want to mock other external dependencies in tests
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
seaweedfs.host=localhost
seaweedfs.port=9999
seaweedfs.bucket=test-bucket
seaweedfs.access-key=test
seaweedfs.secret-key=test
