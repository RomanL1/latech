spring.application.name=latech-renderer

server.port=${PORT:8090}

# seaweedfs
seaweedfs.host=${SEAWEEDFS_HOST:localhost}
seaweedfs.port=${SEAWEEDFS_PORT:8333}
seaweedfs.access-key=${SEAWEEDFS_ACCESS_KEY:changeme}
seaweedfs.secret-key=${SEAWEEDFS_SECRET_KEY:changeme}
seaweedfs.bucket=${SEAWEEDFS_BUCKET:renderer}

# Serverless scale-to-zero optimizations
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:admin}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:your_secure_password_here}
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=1000
spring.rabbitmq.listener.simple.retry.max-retries=3
spring.rabbitmq.listener.simple.retry.max-interval=10000
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.concurrency=1
spring.rabbitmq.listener.simple.max-concurrency=1
spring.rabbitmq.listener.simple.prefetch=1

# 50 * 1024 * 1024:
PdfJobWorker.maxOutputSizeBytes=52428800
