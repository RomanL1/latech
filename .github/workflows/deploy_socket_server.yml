name: Deploy Socket Server to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'src/socket-server/**'
      - '.github/workflows/deploy_socket_server.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    container: ghcr.io/railwayapp/cli:latest
    env:
      SVC_ID: "websocket-server"
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_GITHUB_ACTIONS_DEPLOY }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway (Socket Server)
        run: railway up --service=${{ env.SVC_ID }} --environment=staging --detach
        working-directory: ./src/socket-server
