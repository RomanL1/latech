name: Deploy Renderer to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'src/renderer/**'
      - '.github/workflows/deploy_renderer.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    container: ghcr.io/railwayapp/cli:latest
    env:
      SVC_ID: "renderer"
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_GITHUB_ACTIONS_DEPLOY }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Railway (Renderer)
        run: railway up --service=${{ env.SVC_ID }} --environment=staging --detach
        working-directory: ./src/renderer
