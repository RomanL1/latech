name: Continuous Integration Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  # API application
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build & test with Gradle
        run: ./gradlew build --no-daemon

  # Renderer application
  renderer:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/renderer

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build & test with Gradle
        run: ./gradlew build --no-daemon

  # Frontend application
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun ci

      - name: Lint with ESLint
        run: bun run lint:check

      - name: Lint with Prettier
        run: bun run prettier:check

      - name: Run tests
        run: bun run test

      - name: Build
        run: bun run build:ci

  build-and-push:
    runs-on: ubuntu-latest
    needs:
      - api
      - renderer
      - frontend
    strategy:
      matrix:
        component: [api, renderer, frontend, socket-server]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          
      - name: Check for changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            changed:
              - 'src/${{ matrix.component }}/**'
      
      - name: Login to Container Registry
        if: steps.filter.outputs.changed == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: steps.filter.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Downcase REPO
        if: steps.filter.outputs.changed == 'true'
        run: |
          echo "REPO=${GITHUB_REPOSITORY,,}" >>${GITHUB_ENV}

      - name: Build and push ${{ matrix.component }} image
        if: steps.filter.outputs.changed == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ./src/${{ matrix.component }}
          push: true
          tags: ghcr.io/${{ env.REPO }}/${{ matrix.component }}:latest
  
  deploy:
    runs-on: ubuntu-latest
    environment: prod
    needs:
      - build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for changes
        uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            changed:
              - 'src/api/**'
              - 'src/renderer/**'
              - 'src/frontend/**'
              - 'src/socket-server/**'
              - 'deploy.prod.yml'
              - 'Caddyfile'

      - name: Copy deploy files to Droplet
        if: steps.filter.outputs.changed == 'true'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          source: "deploy.prod.yml,Caddyfile,src/renderer/src/main/resources/tex-renderer-Dockerfile"
          target: "/opt/latech"

      - name: Deploy to DigitalOcean Droplet via SSH
        if: steps.filter.outputs.changed == 'true'
        uses: appleboy/ssh-action@v1.0.3
        env:
          RABBITMQ_USER: ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SEAWEEDFS_ACCESS_KEY: ${{ secrets.SEAWEEDFS_ACCESS_KEY }}
          SEAWEEDFS_SECRET_KEY: ${{ secrets.SEAWEEDFS_SECRET_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.DO_HOST }}
          username: ${{ secrets.DO_USERNAME }}
          key: ${{ secrets.DO_SSH_KEY }}
          envs: RABBITMQ_USER,RABBITMQ_PASSWORD,POSTGRES_USER,POSTGRES_PASSWORD,SEAWEEDFS_ACCESS_KEY,SEAWEEDFS_SECRET_KEY,GH_TOKEN
          script: |
            cd /opt/latech
            
            # Create .env dynamically and safely
            cat <<EOF > .env
            RABBITMQ_USER=$RABBITMQ_USER
            RABBITMQ_PASSWORD=$RABBITMQ_PASSWORD
            POSTGRES_USER=$POSTGRES_USER
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            SEAWEEDFS_ACCESS_KEY=$SEAWEEDFS_ACCESS_KEY
            SEAWEEDFS_SECRET_KEY=$SEAWEEDFS_SECRET_KEY
            DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)
            EOF

            docker build -t tex-renderer-image -f src/renderer/src/main/resources/tex-renderer-Dockerfile .

            # If your GHCR images are private, uncomment the next line:
            echo "$GH_TOKEN" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose -f deploy.prod.yml pull
            docker compose -f deploy.prod.yml up -d --remove-orphans
            docker system prune -af

      
    